<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva tu Cita</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
            color: #0f172a;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        input, select {
            width: 100%;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            ring: 2px solid var(--primary);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #1d4ed8;
        }

        button:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        #status {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            display: none;
            text-align: center;
        }

        .status-success {
            background-color: #dcfce7;
            color: #166534;
            display: block !important;
        }

        .status-error {
            background-color: #fee2e2;
            color: #991b1b;
            display: block !important;
        }

        .loading {
            display: flex;
            justify-content: center;
            margin-top: 1rem;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Reserva tu Cita</h1>
        <form id="bookingForm">
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" name="nombre" placeholder="Juan Pérez" required>
            </div>
            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="juan@ejemplo.com" required>
            </div>
            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha" required>
            </div>
            <div class="form-group">
                <label for="hora">Hora</label>
                <select id="hora" name="hora" required>
                    <option value="">Selecciona una hora</option>
                    <option value="09:00">09:00 AM</option>
                    <option value="10:00">10:00 AM</option>
                    <option value="11:00">11:00 AM</option>
                    <option value="12:00">12:00 PM</option>
                    <option value="15:00">03:00 PM</option>
                    <option value="16:00">04:00 PM</option>
                    <option value="17:00">05:00 PM</option>
                </select>
            </div>
            <button type="submit" id="submitBtn">Reservar Cita</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        const WEBHOOK_DISPONIBILIDAD = 'https://hook.eu1.make.com/fco3ae7vwowtmi9tel1w2ouk7qje752y';
        const WEBHOOK_RESERVA = 'https://hook.eu1.make.com/cik4oymehtf47b6x2tvo1njx5jb2nsi4';

        const form = document.getElementById('bookingForm');
        const statusDiv = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        form.onsubmit = async (e) => {
            e.preventDefault();
            
            const formData = {
                nombre: form.nombre.value,
                correo: form.correo.value,
                fecha: form.fecha.value,
                hora: form.hora.value
            };

            statusDiv.className = '';
            statusDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div> Verificando disponibilidad...';
            statusDiv.style.display = 'block';
            submitBtn.disabled = true;

            try {
                // 1. Comprobar disponibilidad
                const checkRes = await fetch(WEBHOOK_DISPONIBILIDAD, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fecha: formData.fecha, hora: formData.hora })
                });

                let checkData = {};
                try {
                    checkData = await checkRes.json();
                } catch (e) {
                    checkData = { disponible: true };
                }

                if (Array.isArray(checkData) && checkData.length > 0) {
                    statusDiv.className = 'status-error';
                    statusDiv.textContent = 'Lo sentimos, esa hora ya está reservada. Por favor elige otra.';
                    submitBtn.disabled = false;
                    return;
                }

                // 2. Crear reserva
                statusDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div> Procesando tu reserva...';
                const reserveRes = await fetch(WEBHOOK_RESERVA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (reserveRes.ok) {
                    statusDiv.className = 'status-success';
                    statusDiv.textContent = '¡Reserva realizada con éxito! Recibirás un correo de confirmación pronto.';
                    form.reset();
                } else {
                    throw new Error('Error al procesar la reserva');
                }
            } catch (error) {
                statusDiv.className = 'status-error';
                statusDiv.textContent = 'Hubo un error al procesar tu solicitud. Inténtalo de nuevo más tarde.';
                console.error(error);
            } finally {
                submitBtn.disabled = false;
            }
        };

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('fecha').setAttribute('min', today);
    </script>
</body>
</html>
